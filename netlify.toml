[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Landing subdomain → /landing rewrite
[[redirects]]
  from = "/*"
  to = "/landing/:splat"
  status = 200
  conditions = { Host = ["landing.syncera.com"] }
